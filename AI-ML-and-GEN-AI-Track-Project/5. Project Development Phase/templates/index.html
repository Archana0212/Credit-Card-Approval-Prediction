<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Approval Prediction</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, Helvetica, sans-serif;
}
body{
    min-height:100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px 20px;
}
.page-shell{
    width:100%;
    max-width:980px;
}
.container{
    width:100%;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.12);
    border-radius: 28px;
    padding: 38px;
    box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
    color: #e2e8f0;
    position: relative;
    overflow: hidden;
}
.container::before{
    content:'';
    position:absolute;
    inset:0;
    background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 30%), radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.14), transparent 25%);
    pointer-events:none;
}
.header{
    position: relative;
    z-index:1;
    margin-bottom:30px;
}
.icon{
    width:72px;
    height:72px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:18px;
    font-size:34px;
    background: rgba(148, 163, 184, 0.08);
    border-radius: 16px;
}
h1{
    font-size: 36px;
    margin-bottom:10px;
    letter-spacing: -0.03em;
}
p{
    color: #cbd5e1;
    line-height:1.8;
    max-width: 820px;
}
.form-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(220px, 1fr));
    gap:18px 22px;
    position: relative;
    z-index:1;
}
.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}
.form-group label{
    font-size:14px;
    font-weight:600;
    color:#f8fafc;
}
input[type=number], select{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid rgba(148, 163, 184, 0.16);
    background:#0f172a;
    color:#f8fafc;
    font-size:14px;
    outline:none;
}
input[type=number]::placeholder{
    color:rgba(148, 163, 184, 0.8);
}
input[type=number]:focus, select:focus{
    border-color: rgba(56, 189, 248, 0.9);
    box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
}
.actions{
    margin-top:24px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    position: relative;
    z-index:1;
}
.btn{
    border:none;
    border-radius:14px;
    padding:15px 26px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition: transform 0.2s ease, background-color 0.2s ease;
}
.btn.predict{
    background:#0ea5e9;
    color:#fff;
    flex:1;
    min-width:180px;
}
.btn.clear{
    background:rgba(148, 163, 184, 0.12);
    color:#e2e8f0;
    flex:1;
    min-width:180px;
}
.btn:hover{
    transform:translateY(-2px);
}
.btn.predict:hover{
    background:#0284c7;
}
.btn.clear:hover{
    background:rgba(148, 163, 184, 0.2);
}
.nav-buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-top:30px;
    position: relative;
    z-index:1;
}
.nav-buttons a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:14px 24px;
    border-radius:14px;
    text-decoration:none;
    background: rgba(148, 163, 184, 0.12);
    color:#f8fafc;
    font-weight:600;
    transition: background-color 0.2s ease;
}
.nav-buttons a:hover{
    background: rgba(148, 163, 184, 0.22);
}
footer{
    margin-top:24px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
    position: relative;
    z-index:1;
}
.loading-overlay{
    position:fixed;
    inset:0;
    background: rgba(15, 23, 42, 0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.2s ease;
    z-index:999;
}
.loading-overlay.visible{
    opacity:1;
    pointer-events:auto;
}
.loading-card{
    background: rgba(15, 23, 42, 0.96);
    border:1px solid rgba(148, 163, 184, 0.18);
    border-radius:20px;
    padding:28px 32px;
    text-align:center;
    color:#e2e8f0;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
}
.spinner{
    width:48px;
    height:48px;
    margin:0 auto 18px;
    border:5px solid rgba(148, 163, 184, 0.18);
    border-top-color:#38bdf8;
    border-radius:50%;
    animation: spin 1s linear infinite;
}
@keyframes spin{
    to{transform:rotate(360deg);}
}
@media(max-width:860px){
    .form-grid{
        grid-template-columns:1fr;
    }
    .actions{
        flex-direction:column;
    }
}
@media(max-width:600px){
    body{
        padding:20px 16px;
    }
    .container{
        padding:28px 22px;
    }
    h1{
        font-size:28px;
    }
}
</style>
</head>
<body>
<div class="page-shell">
    <div class="container">
        <div class="header">
            <div class="icon">💳</div>
            <h1>Credit Card Approval Prediction</h1>
            <p>Complete the applicant details below to receive a fast, reliable estimate of approval for a credit card application.</p>
        </div>

        <form action="/predict" method="post" onsubmit="return showLoading();">
            <div class="form-grid">
                <div class="form-group">
                    <label for="Gender">Gender</label>
                    <select id="Gender" name="Gender" required>
                        <option value="" disabled selected hidden>Select Gender</option>
                        <option value="a">Male</option>
                        <option value="b">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="Age">Age</label>
                    <input id="Age" type="number" step="0.1" name="Age" placeholder="e.g. 34" required>
                </div>
                <div class="form-group">
                    <label for="Debt">Total Debt</label>
                    <input id="Debt" type="number" step="0.01" name="Debt" placeholder="e.g. 12000" required>
                </div>
                <div class="form-group">
                    <label for="Married">Marital Status</label>
                    <select id="Married" name="Married" required>
                        <option value="" disabled selected hidden>Select Status</option>
                        <option value="u">Married</option>
                        <option value="y">Single</option>
                        <option value="l">Separated</option>
                        <option value="?">Unknown</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="BankCustomer">Bank Customer</label>
                    <select id="BankCustomer" name="BankCustomer" required>
                        <option value="" disabled selected hidden>Select Customer Type</option>
                        <option value="g">Regular Customer</option>
                        <option value="gg">Premium Customer</option>
                        <option value="p">New Customer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="Industry">Industry</label>
                    <select id="Industry" name="Industry" required>
                        <option value="" disabled selected hidden>Select Industry</option>
                        <option value="aa">Agriculture</option>
                        <option value="c">Construction</option>
                        <option value="cc">Communication</option>
                        <option value="d">Education</option>
                        <option value="e">Engineering</option>
                        <option value="ff">Finance</option>
                        <option value="i">IT</option>
                        <option value="j">Healthcare</option>
                        <option value="k">Legal</option>
                        <option value="m">Manufacturing</option>
                        <option value="q">Retail</option>
                        <option value="r">Research</option>
                        <option value="w">Transportation</option>
                        <option value="x">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="Ethnicity">Ethnicity</label>
                    <select id="Ethnicity" name="Ethnicity" required>
                        <option value="" disabled selected hidden>Select Ethnicity</option>
                        <option value="bb">Asian</option>
                        <option value="dd">Black</option>
                        <option value="ff">White</option>
                        <option value="h">Hispanic</option>
                        <option value="j">Middle Eastern</option>
                        <option value="n">Native American</option>
                        <option value="o">Pacific Islander</option>
                        <option value="v">Mixed</option>
                        <option value="z">Other</option>
                        <option value="?">Unknown</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="YearsEmployed">Years Employed</label>
                    <input id="YearsEmployed" type="number" step="0.01" name="YearsEmployed" placeholder="e.g. 4.5" required>
                </div>
                <div class="form-group">
                    <label for="PriorDefault">Previous Loan Default</label>
                    <select id="PriorDefault" name="PriorDefault" required>
                        <option value="" disabled selected hidden>Select Option</option>
                        <option value="t">Yes</option>
                        <option value="f">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="Employed">Currently Employed</label>
                    <select id="Employed" name="Employed" required>
                        <option value="" disabled selected hidden>Select Option</option>
                        <option value="t">Yes</option>
                        <option value="f">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="CreditScore">Credit Score</label>
                    <input id="CreditScore" type="number" name="CreditScore" placeholder="e.g. 720" required>
                </div>
                <div class="form-group">
                    <label for="DriversLicense">Driver's License</label>
                    <select id="DriversLicense" name="DriversLicense" required>
                        <option value="" disabled selected hidden>Select Option</option>
                        <option value="t">Yes</option>
                        <option value="f">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="Citizen">Citizenship Status</label>
                    <select id="Citizen" name="Citizen" required>
                        <option value="" disabled selected hidden>Select Status</option>
                        <option value="g">Citizen</option>
                        <option value="p">Permanent Resident</option>
                        <option value="s">Foreign National</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ZipCode">ZIP Code</label>
                    <input id="ZipCode" type="number" name="ZipCode" placeholder="e.g. 94105" required>
                </div>
                <div class="form-group">
                    <label for="Income">Annual Income</label>
                    <input id="Income" type="number" name="Income" placeholder="e.g. 55000" required>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn predict">🚀 Predict Approval</button>
                <button type="reset" class="btn clear">🔄 Clear Form</button>
            </div>
        </form>

        <div class="nav-buttons">
            <a href="/" class="btn">🏠 Back to Home</a>
            <a href="/about" class="btn">📊 About Project</a>
        </div>

        <footer>
            Machine Learning • Flask • Logistic Regression
        </footer>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-card">
        <div class="spinner"></div>
        <p>Sending application details for scoring...</p>
    </div>
</div>

<script>
function showLoading() {
    document.getElementById('loadingOverlay').classList.add('visible');
    return true;
}
</script>
</body>
</html>
