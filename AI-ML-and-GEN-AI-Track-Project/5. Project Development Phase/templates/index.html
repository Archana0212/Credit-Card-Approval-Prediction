<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credit Card Approval Prediction</title>

<style>
.form-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px 22px;
    text-align:left;
}
.form-group{
    display:flex;
    flex-direction:column;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(135deg,#141E30,#243B55,#4A00E0);
    overflow-x:hidden;
    overflow-y:auto;
    padding:40px 20px;
}

/* Decorative Background */
body::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#00c6ff;
    border-radius:50%;
    top:-120px;
    left:-80px;
    opacity:.20;
}

body::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#ff4b91;
    border-radius:50%;
    bottom:-100px;
    right:-70px;
    opacity:.20;
}

/* Card */
.container{
    width:450px;
    padding:35px;
    border-radius:20px;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);

    box-shadow:0 15px 35px rgba(0,0,0,.35);

    text-align:center;
    color:white;

    margin:20px 0 60px;   /* IMPORTANT for scroll space */
}

.icon{
    font-size:60px;
    margin-bottom:10px;
}

h2{
    margin-bottom:10px;
    font-size:32px;
}

p{
    color:#dddddd;
    margin-bottom:25px;
}

/* Inputs */

label{
    display:block;
    text-align:left;
    margin-top:12px;
    margin-bottom:6px;
    font-weight:bold;
}

input[type=text]{

    width:100%;
    padding:12px;

    border:none;
    border-radius:8px;

    outline:none;

    font-size:15px;
}
input,
select{

    width:100%;
    padding:12px;

    border:none;
    border-radius:8px;

    outline:none;

    font-size:15px;
}

/* Buttons */

.btn{

    width:100%;
    padding:12px;

    border:none;
    border-radius:8px;

    margin-top:20px;

    font-size:17px;
    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

.predict{

    background:#00c853;
    color:white;
}

.predict:hover{

    background:#009624;
}

.clear{

    background:#ff9800;
    color:white;
}

.clear:hover{

    background:#ef6c00;
}

.home{

    display:inline-block;

    margin-top:20px;

    text-decoration:none;

    color:white;

    background:#3f51b5;

    padding:10px 20px;

    border-radius:8px;

    transition:.3s;
}

.home:hover{

    background:#283593;
}

footer{

    margin-top:25px;
    color:#dddddd;
    font-size:14px;
}
.nav-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}


.about{

    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:white;
    background:#0097a7;
    padding:10px 20px;
    border-radius:8px;
    transition:.3s;
}

.about:hover{

    background:#006064;
}

</style>

</head>

<body>

<div class="container">

<div class="icon">💳</div>

<h2>Applicant Details</h2>

<p>Fill in the details below to predict your credit card approval status.</p>

<form action="/predict" method="post">

<div class="form-grid">

  <div class="form-group">
    <label>Gender</label>
    <select name="Gender">
   <option value="">Select Gender</option>
   <option value="a">Male</option>
   <option value="b">Female</option>
   <option value="?">Unknown</option>
    </select>
   </div>

  <div class="form-group">
    <label>Age</label>
    <input type="number" step="0.1" name="Age" required>
  </div>

  <div class="form-group">
    <label>Debt</label>
    <input type="number" step="0.01" name="Debt" required>
  </div>

  <div class="form-group">
    <label>Marital Status</label>
    <select name="Married" required>
    <option value="u">Married</option>
    <option value="y">Single</option>
    <option value="l">Separated</option>
    <option value="?">Unknown</option>
    </select>
  </div>

  <div class="form-group">
    <label>Bank Customer</label>
    <select name="BankCustomer" required>
        <option value="">Select</option>
        <option value="g">Regular Customer</option>
        <option value="gg">Premium Customer</option>
        <option value="p">New Customer</option>
        <option value="?">Unknown</option> 
    </select>
</div>
    <div class="form-group">
    <label>Industry</label>
    <select name="Industry" required>
<option value="aa">Agriculture</option>
<option value="c">Construction</option>
<option value="cc">Communication</option>
<option value="d">Education</option>
<option value="e">Engineering</option>
<option value="ff">Finance</option>
<option value="i">IT</option>
<option value="j">Healthcare</option>
<option value="k">Legal</option>
<option value="m">Manufacturing</option>
<option value="q">Retail</option>
<option value="r">Research</option>
<option value="w">Transportation</option>
<option value="x">Other</option>
<option value="?">Unknown</option>
    </select>
</div>
<div class="form-group">
    <label>Ethnicity</label>
    <select name="Ethnicity" required>
  <option value="bb">Asian</option>
<option value="dd">Black</option>
<option value="ff">White</option>
<option value="h">Hispanic</option>
<option value="j">Middle Eastern</option>
<option value="n">Native American</option>
<option value="o">Pacific Islander</option>
<option value="v">Mixed</option>
<option value="z">Other</option>
<option value="?">Unknown</option>
    </select>
</div>
  <div class="form-group">
    <label>Years Employed</label>
    <input type="number" step="0.01" name="YearsEmployed" required>
</div>
<div class="form-group">
    <label>Previous Loan Default</label>
    <select name="PriorDefault" required>
       <option value="t">Yes</option>
<option value="f">No</option>
    </select>
</div>
<div class="form-group">
   <label>Currently Employed</label>
<select name="Employed" required>
    <option value="">Select</option>
    <option value="t">Yes</option>
    <option value="f">No</option>
</select>
</div>
<div class="form-group">
    <label>Credit Score</label>
    <input type="number" name="CreditScore" required>
</div>
<div class="form-group">
    <label>Driver's License</label>
    <select name="DriversLicense" required>
        <option value="">Select</option>
        <option value="t">Yes</option>
        <option value="f">No</option>
    </select>
</div>
<div class="form-group">
    <label>Citizenship Status</label>
    <select name="Citizen" required>
       <option value="g">Citizen</option>
<option value="p">Permanent Resident</option>
<option value="s">Foreign National</option>
    </select>
</div>
<div class="form-group">
    <label>ZIP Code</label>
    <input type="number" name="ZipCode" required>
</div>
<div class="form-group">
    <label>Annual Income</label>
    <input type="number" name="Income" required>
</div>
</div>
<button class="btn predict" type="submit">🚀 Predict Approval</button>
<button class="btn clear" type="reset">🔄 Clear Form</button>
</form>

<div class="nav-buttons">

    <a href="/" class="home">
        🏠 Back to Home
    </a>

    <a href="/about" class="about">
        📊 About Project
    </a>

</div>

<footer>
Machine Learning • Flask • Random Forest
</footer>

</div>

</body>
</html>
