<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Approval Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter, Arial, sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);display:flex;align-items:center;justify-content:center;padding:30px;}
.container{width:100%;max-width:720px;background:rgba(15,23,42,0.95);border:1px solid rgba(148,163,184,0.15);border-radius:28px;padding:42px;box-shadow:0 24px 80px rgba(15,23,42,0.45);color:#e2e8f0;}
h1{font-size:42px;margin-bottom:14px;}
p{color:#cbd5e1;line-height:1.8;margin-bottom:30px;font-size:17px;}
.emoji{font-size:60px;margin-bottom:18px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 28px;border-radius:16px;text-decoration:none;font-weight:700;transition:transform .2s ease,background-color .2s ease;}
.btn.predict{background:#38bdf8;color:#0f172a;margin-right:14px;}
.btn.about{background:#f97316;color:#fff;}
.btn:hover{transform:translateY(-2px);}
footer{margin-top:34px;color:#94a3b8;font-size:14px;text-align:center;}
@media(max-width:640px){.container{padding:28px;}h1{font-size:32px;}.btn{width:100%;margin-bottom:14px;}.btn.predict{margin-right:0;}}
</style>
</head>
<body>
<div class="container">
    <div class="emoji">💳</div>
    <h1>Credit Card Approval Prediction</h1>
    <p>Predict whether a credit card application is likely to be approved or rejected using a trained logistic regression model and a clean, easy form.</p>
    <a href="/predict" class="btn predict">🚀 Start Prediction</a>
    <a href="/about" class="btn about">📊 About Project</a>
    <footer>Developed using Flask • Logistic Regression • User-friendly interface</footer>
</div>
</body>
</html>
